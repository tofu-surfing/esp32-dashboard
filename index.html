        // ─── 3. 核心大腦：演算法解算中心 ─────────────────────────────────
        function processAndRender(rawObjects, targetDate, viewMode) {
            let dataArray = Object.values(rawObjects).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            // 變數宣告
            let totalWaterToday = 0;         // 🎯 新增：專屬當天的喝水量
            let totalWaterSelectedRange = 0; // 🎯 新增：專屬所選區間的喝水量
            
            let stableWeightBuffer = [];
            let lastStableWeight = null;
            let totalInSeatSeconds = 0;
            let lastValidDistance = 30;
            let timelineProcessed = [];

            // 取得今天的台灣日期字串 (用來鎖定當天喝水量)
            const todayStr = new Date().toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');

            // 🎯【第一輪：清洗時間格式、套用你的全新硬體條件判斷】
            for (let i = 0; i < dataArray.length; i++) {
                let item = dataArray[i];

                // 時間防錯過濾
                if (!item.timestamp || typeof item.timestamp !== 'string' || item.timestamp.includes("uptime") || isNaN(Date.parse(item.timestamp))) {
                    continue;
                }

                let t = new Date(item.timestamp);
                // 轉為台灣本地日期字串 YYYY-MM-DD
                let itemDateStr = t.toLocaleDateString('zh-TW', {timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit'}).replace(/\//g, '-');

                // A. 超音波無效值過濾
                let dist = item.distance_cm;
                if (dist > 230 || dist <= 0) dist = lastValidDistance;
                else lastValidDistance = dist;

                // B. 水杯喝水量濾波演算法
                let currentWeight = item.weight_g;
                let isWaterEvent = false; // 記錄這一步是不是喝水事件
                let weightDiff = 0;

                if (stableWeightBuffer.length === 0) {
                    stableWeightBuffer.push(currentWeight);
                } else {
                    let lastInBuf = stableWeightBuffer[stableWeightBuffer.length - 1];
                    if (Math.abs(currentWeight - lastInBuf) < 2.0) {
                        stableWeightBuffer.push(currentWeight);
                    } else {
                        stableWeightBuffer = [currentWeight];
                    }
                }
                if (stableWeightBuffer.length >= 3) {
                    let avgStableWeight = stableWeightBuffer.reduce((a,b)=>a+b, 0) / stableWeightBuffer.length;
                    if (lastStableWeight !== null) {
                        weightDiff = lastStableWeight - avgStableWeight;
                        if (weightDiff > 5.0) {
                            isWaterEvent = true;
                        }
                    }
                    lastStableWeight = avgStableWeight;
                    stableWeightBuffer = [];
                }

                // ─── 🎯 喝水量精準分流計算 ───
                if (isWaterEvent) {
                    // 1. 如果事件日期就是今天，加總到當天喝水量
                    if (itemDateStr === todayStr) {
                        totalWaterToday += weightDiff;
                    }
                    // 2. 如果是單日模式且是選中那天，或者處於週模式，先暫存這個事件供後續判定
                }

                // 🎯【核心修正：完全遵照你的條件定義】
                let isPresent = dist <= 80;          // 距離 < 1m
                let isScreenOpen = item.light_pct < 80; // 螢幕打開 (<80)
                let isScreenBlack = item.light_pct > 90;// 螢幕黑屏 (>90)
                
                let tempStatus = "未知";
                if (isPresent && isScreenOpen) {
                    tempStatus = "上班中";
                } else if (!isPresent && isScreenBlack) {
                    tempStatus = "休息中"; // 距離>1m 且 螢幕>90
                } else {
                    tempStatus = "休息中"; // 其餘游離狀態暫歸為休息，等下一輪做下班判定
                }

                timelineProcessed.push({
                    timestamp: t,
                    dateStr: itemDateStr,
                    distance: dist,
                    light: item.light_pct,
                    weight: lastStableWeight || currentWeight,
                    status: tempStatus,
                    isWaterEvent: isWaterEvent, // 帶到下一輪
                    weightDiff: weightDiff
                });
            }

            // 🎯【第二輪：修正下班判定（休息達 3 小時以上變下班）】
            let restStartIndex = null;
            for (let i = 0; i < timelineProcessed.length; i++) {
                if (timelineProcessed[i].status === "休息中") {
                    if (restStartIndex === null) restStartIndex = i;
                } else if (timelineProcessed[i].status === "上班中") {
                    if (restStartIndex !== null) {
                        let durationMs = timelineProcessed[i].timestamp - timelineProcessed[restStartIndex].timestamp;
                        if (durationMs >= 3 * 60 * 60 * 1000) {
                            for (let j = restStartIndex; j < i; j++) {
                                timelineProcessed[j].status = "下班";
                            }
                        }
                        restStartIndex = null;
                    }
                }
            }
            if (restStartIndex !== null) {
                let durationMs = timelineProcessed[timelineProcessed.length-1].timestamp - timelineProcessed[restStartIndex].timestamp;
                if (durationMs >= 3 * 60 * 60 * 1000) {
                    for (let j = restStartIndex; j < timelineProcessed.length; j++) {
                        timelineProcessed[j].status = "下班";
                    }
                }
            }

            // 🎯【第三輪：根據控制列所選的「日期」與「檢視模式」進行篩選與出圖】
            let filteredTimeline = [];
            
            if (viewMode === 'day') {
                // 單日完整模式：只篩選等於所選日期的資料
                filteredTimeline = timelineProcessed.filter(item => item.dateStr === targetDate);
                document.getElementById('mixed-chart-title').innerText = `座艙環境與行為疊圖 (${targetDate} 當天完整記錄)`;
                
                // 🎯 加總所選單日的喝水量
                filteredTimeline.forEach(item => {
                    if (item.isWaterEvent) totalWaterSelectedRange += item.weightDiff;
                });
            } else {
                // 週模式：篩選目標日期前後 7 天的資料
                let endPeriod = new Date(targetDate + "T23:59:59");
                let startPeriod = new Date(endPeriod.getTime() - 7 * 24 * 60 * 60 * 1000);
                document.getElementById('mixed-chart-title').innerText = `座艙環境與行為趨勢圖 (${startPeriod.toLocaleDateString()} ~ ${endPeriod.toLocaleDateString()} 每兩小時聚合)`;

                let rawWeekData = timelineProcessed.filter(item => item.timestamp >= startPeriod && item.timestamp <= endPeriod);
                
                // 🎯 加總整週區間內的喝水量
                rawWeekData.forEach(item => {
                    if (item.isWaterEvent) totalWaterSelectedRange += item.weightDiff;
                });

                filteredTimeline = aggregateDataBy2Hours(rawWeekData);
            }

            // 計算上班時間
            let seatSeconds = 0;
            filteredTimeline.forEach(item => {
                if (item.status === "上班中") {
                    seatSeconds += (viewMode === 'day') ? 10 : 7200;
                }
            });

            // 更新即時 UI 狀態文字
            if (timelineProcessed.length > 0) {
                document.getElementById("current-status").innerText = timelineProcessed[timelineProcessed.length - 1].status;
                const statusEl = document.getElementById("current-status");
                if(statusEl.innerText === "上班中") statusEl.className = "text-2xl font-extrabold text-emerald-600 mt-2";
                else if(statusEl.innerText === "休息中") statusEl.className = "text-2xl font-extrabold text-amber-500 mt-2";
                else statusEl.className = "text-2xl font-extrabold text-slate-400 mt-2";
            }

            // 🎯【更新資訊方塊】：動態調配喝水量語意
            // 將「所選區間喝水量」方塊填入對應區間加總值
            document.getElementById("stat-water").innerText = `${totalWaterSelectedRange.toFixed(0)} mL`;
            
            // 💡 提示：如果你想把「目前最新狀態」或網頁某處改成「今日總喝水」，可以用 totalWaterToday 變數。
            // 這裡將 stat-water 綁定為使用者所選區間的喝水量。

            let hrs = Math.floor(seatSeconds / 3600);
            let mns = Math.floor((seatSeconds % 3600) / 60);
            document.getElementById("stat-uptime").innerText = `${hrs} 小時 ${mns} 分`;

            const healthEl = document.getElementById("stat-health");
            const alertEl = document.getElementById("health-alert");
            if (hrs >= 8) {
                healthEl.innerText = "疲勞/不健康";
                healthEl.className = "text-2xl font-extrabold text-red-500 mt-2";
                if(viewMode === 'day') alertEl.classList.remove("hidden");
            } else {
                healthEl.innerText = "良好";
                healthEl.className = "text-2xl font-extrabold text-emerald-500 mt-2";
                alertEl.classList.add("hidden");
            }

            renderCharts(filteredTimeline, hrs);
        }

        // 🧮 週檢視：每 2 小時切切碎聚合演算法
        function aggregateDataBy2Hours(dataArr) {
            if (dataArr.length === 0) return [];
            let result = [];
            
            // 以 2 小時 (7200000 毫秒) 為一個桶子
            let intervalMs = 2 * 60 * 60 * 1000;
            let startTime = Math.floor(dataArr[0].timestamp.getTime() / intervalMs) * intervalMs;
            let endTime = dataArr[dataArr.length - 1].timestamp.getTime();

            for (let b = startTime; b <= endTime; b += intervalMs) {
                let bucketData = dataArr.filter(item => item.timestamp.getTime() >= b && item.timestamp.getTime() < b + intervalMs);
                if (bucketData.length > 0) {
                    // 算平均值

<body class="bg-slate-100 text-slate-800 font-sans">

    <header class="bg-indigo-600 text-white shadow-md p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">IoT 工作座艙健康 Dashboard</h1>
            <div class="flex items-center space-x-4">
                <div class="text-slate-800 space-x-2 flex items-center bg-white p-2 rounded-lg shadow-sm text-sm">
                    <label class="font-bold text-slate-600">選擇日期：</label>
                    <input type="date" id="date-picker" class="border rounded p-1 font-semibold" onchange="onDateOrViewChange()">
                    <select id="view-mode" class="border rounded p-1 font-semibold" onchange="onDateOrViewChange()">
                        <option value="day">單日完整時序</option>
                        <option value="week">本週趨勢 (2小時為計)</option>
                    </select>
                </div>
                <div id="connection-status" class="bg-emerald-500 px-3 py-1 rounded-full text-sm font-semibold animate-pulse">
                    即時連線中
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 relative">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="text-sm text-slate-500 font-bold">目前最新狀態</div>
                <div id="current-status" class="text-2xl font-extrabold text-indigo-600 mt-2">分析中...</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="text-sm text-slate-500 font-bold">所選區間總喝水量</div>
                <div id="stat-water" class="text-2xl font-extrabold text-sky-600 mt-2">0 mL</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="text-sm text-slate-500 font-bold">電腦前工作時長</div>
                <div id="stat-uptime" class="text-2xl font-extrabold text-emerald-600 mt-2">0 小時 0 分</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden">
                <div class="text-sm text-slate-500 font-bold">綜合疲勞健康指數</div>
                <div id="stat-health" class="text-2xl font-extrabold text-emerald-500 mt-2">良好</div>
                <div id="mood-emoji" class="absolute right-4 top-4 text-4xl select-none filter drop-shadow-sm transition-transform duration-300 hover:scale-110" title="當前語音辨識情緒">😐</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 lg:col-span-2">
                <h3 class="text-lg font-bold text-slate-700 mb-4" id="mixed-chart-title">座艙環境與行為疊圖</h3>
                <div class="h-96"><canvas id="chart-mixed"></canvas></div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center">
                <h3 class="text-lg font-bold text-slate-700 w-full mb-4 text-left">當日工時占比圖</h3>
                <div class="h-72 w-72"><canvas id="chart-health"></canvas></div>
                <div id="health-alert" class="mt-4 text-sm font-semibold text-center text-red-500 hidden">
                    ⚠️ 警告：今日身心累積疲勞度過高，請立刻遠離電腦休息！
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-700">水杯淨重追蹤 (濾波後實時重量)</h3>
                    <span class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded font-mono">全量動態捕捉演算法</span>
                </div>
                <div class="h-72"><canvas id="chart-weight-curve"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        let chartMixed, chartHealth, chartWeightCurve;
        let globalSensorData = null;
        let globalVoiceData = null;

        const firebaseConfig = {
            databaseURL: "https://esp-to-web-72def-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('date-picker').value = `${yyyy}-${mm}-${dd}`;
            
            initCharts();
            
            db.ref("/sensors/log").on("value", (snapshot) => {
                globalSensorData = snapshot.val();
                checkAndTriggerRender();
            });

            db.ref("/voice/log").on("value", (snapshot) => {
                globalVoiceData = snapshot.val();
                checkAndTriggerRender();
            });
        };

        function checkAndTriggerRender() {
            if (globalSensorData) {
                onDateOrViewChange();
            } else {
                document.getElementById("current-status").innerText = "等待感測器數據...";
            }
        }

        function onDateOrViewChange() {
            const targetDate = document.getElementById('date-picker').value;
            const viewMode = document.getElementById('view-mode').value;
            processAndRender(globalSensorData, globalVoiceData, targetDate, viewMode);
        }

        function processAndRender(sensorObjects, voiceObjects, targetDate, viewMode) {
            // 🛠️ 將網頁選擇的日期 "2026-06-04" 轉成 "20260604" 以匹配你的 Firebase Key
            let targetKeyDate = targetDate.replace(/-/g, ""); 

            // 建立週模式的允許 Key 清單
            let allowedKeyDates = [targetKeyDate];
            if (viewMode === 'week') {
                let endDate = new Date(`${targetDate}T12:00:00`);
                for (let k = 1; k <= 7; k++) {
                    let d = new Date(endDate.getTime() - k * 24 * 60 * 60 * 1000);
                    let ym = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
                    allowedKeyDates.push(ym);
                }
            }

            let stableWeightBuffer = [];
            let lastStableWeight = null;
            let lastValidDistance = 30;
            let timelineProcessed = [];
            let totalWaterSelectedRange = 0; 

            // 🛠️ 核心修正點：不再解析不穩定的欄位，直接抓取 Firebase 的 Object Key 名稱！
            let sensorKeys = Object.keys(sensorObjects || {}).sort();
            
            for (let i = 0; i < sensorKeys.length; i++) {
                let nodeKey = sensorKeys[i]; // 例如 "20260604_012344"
                let item = sensorObjects[nodeKey];

                // 提取 Key 前 8 碼作為日期比對
                let itemDateKey = nodeKey.substring(0, 8); 
                if (itemDateKey.length !== 8 || isNaN(Number(itemDateKey))) continue; // 略過無效或非時間同步的節點

                // 利用 Key 的時分秒重新精準建立時間物件，徹底隔絕 ISO 字串格式錯亂
                let hh = Number(nodeKey.substring(9, 11)) || 0;
                let fractionMin = Number(nodeKey.substring(11, 13)) || 0;
                let ss = Number(nodeKey.substring(13, 15)) || 0;
                
                // 模擬完整時間物件供圖表渲染
                let year = Number(nodeKey.substring(0, 4));
                let month = Number(nodeKey.substring(4, 6)) - 1;
                let day = Number(nodeKey.substring(6, 8));
                let t = new Date(year, month, day, hh, fractionMin, ss);

                let dist = item.distance_cm;
                if (dist > 230 || dist <= 0) dist = lastValidDistance;
                else lastValidDistance = dist;

                let currentWeight = item.weight_g;
                let weightDiff = 0;

                if (stableWeightBuffer.length === 0) {
                    stableWeightBuffer.push(currentWeight);
                } else {
                    let lastInBuf = stableWeightBuffer[stableWeightBuffer.length - 1];
                    if (Math.abs(currentWeight - lastInBuf) < 2.0) {
                        stableWeightBuffer.push(currentWeight);
                    } else {
                        stableWeightBuffer = [currentWeight];
                    }
                }
                if (stableWeightBuffer.length >= 3) {
                    let avgStableWeight = stableWeightBuffer.reduce((a,b)=>a+b, 0) / stableWeightBuffer.length;
                    if (lastStableWeight !== null) {
                        weightDiff = lastStableWeight - avgStableWeight;
                        if (weightDiff > 5.0) {
                            if (allowedKeyDates.includes(itemDateKey)) {
                                totalWaterSelectedRange += weightDiff; 
                            }
                        }
                    }
                    lastStableWeight = avgStableWeight;
                    stableWeightBuffer = [];
                }

                let isPresent = dist <= 80;
                let isScreenOpen = item.light_pct < 80;
                let tempStatus = (isPresent && isScreenOpen) ? "上班中" : "休息中";

                timelineProcessed.push({
                    timestamp: t,
                    dateKeyStr: itemDateKey,
                    hhmmKey: `${String(hh).padStart(2, '0')}:${String(fractionMin).padStart(2, '0')}`,
                    distance: dist,
                    light: item.light_pct,
                    weight: lastStableWeight !== null ? lastStableWeight : currentWeight, 
                    status: tempStatus
                });
            }

            // 下班判定演算法
            let restStartIndex = null;
            for (let i = 0; i < timelineProcessed.length; i++) {
                if (timelineProcessed[i].status === "休息中") {
                    if (restStartIndex === null) restStartIndex = i;
                } else if (timelineProcessed[i].status === "上班中") {
                    if (restStartIndex !== null) {
                        if (timelineProcessed[i].timestamp - timelineProcessed[restStartIndex].timestamp >= 3 * 60 * 60 * 1000) {
                            for (let j = restStartIndex; j < i; j++) timelineProcessed[j].status = "下班";
                        }
                        restStartIndex = null;
                    }
                }
            }
            if (restStartIndex !== null && timelineProcessed.length > 0) {
                if (timelineProcessed[timelineProcessed.length-1].timestamp - timelineProcessed[restStartIndex].timestamp >= 3 * 60 * 60 * 1000) {
                    for (let j = restStartIndex; j < timelineProcessed.length; j++) timelineProcessed[j].status = "下班";
                }
            }

            // 第二輪：依據所選模式抽取分鐘映射
            let finalTimeline = [];
            if (viewMode === 'day') {
                let dayData = timelineProcessed.filter(item => item.dateKeyStr === targetKeyDate);
                let minutesMap = {};
                dayData.forEach(item => {
                    minutesMap[item.hhmmKey] = item; 
                });
                finalTimeline = Object.keys(minutesMap).sort().map(key => minutesMap[key]);
            } else {
                let weekData = timelineProcessed.filter(item => allowedKeyDates.includes(item.dateKeyStr));
                finalTimeline = aggregateDataBy2Hours(weekData);
            }

            // 刷新卡片資料
            document.getElementById("stat-water").innerText = `${totalWaterSelectedRange.toFixed(0)} mL`;

            let seatSeconds = 0;
            finalTimeline.forEach(item => {
                if (item.status === "上班中") {
                    seatSeconds += (viewMode === 'day') ? 60 : 7200; 
                }
            });
            let hrs = Math.floor(seatSeconds / 3600);
            let mns = Math.floor((seatSeconds % 3600) / 60);
            document.getElementById("stat-uptime").innerText = `${hrs} 小時 ${mns} 分`;

            if (timelineProcessed.length > 0) {
                let latestStatus = timelineProcessed[timelineProcessed.length - 1].status;
                document.getElementById("current-status").innerText = latestStatus;
                document.getElementById("current-status").className = latestStatus === "上班中" ? "text-2xl font-extrabold text-emerald-600 mt-2" : "text-2xl font-extrabold text-amber-500 mt-2";
            }

            // 🛠️ 語音過濾同樣對齊 Firebase 節點 Key 格式
            let voiceKeys = Object.keys(voiceObjects || {});
            let happyCount = 0;
            let sotiredCount = 0;
            let latestVoiceCmd = null;

            voiceKeys.forEach(vKey => {
                let vDateKey = vKey.substring(0, 8);
                if (allowedKeyDates.includes(vDateKey)) {
                    let cmd = voiceObjects[vKey].voice_command;
                    if (cmd === "happy") happyCount++;
                    if (cmd === "sotired") sotiredCount++;
                    latestVoiceCmd = cmd; // 快取最後一次觸發
                }
            });

            // 🎯 計算綜合疲勞健康分數
            let workMinutes = Number(hrs * 60 + mns) || 0;
            let baseCalculatedScore = (workMinutes / 480 * 60) + (sotiredCount * 15) - (happyCount * 10);
            let fatigueScore = Math.max(0, Math.min(100, Math.floor(baseCalculatedScore))) || 0;

            const emojiEl = document.getElementById("mood-emoji");
            if (latestVoiceCmd) {
                if (latestVoiceCmd === "happy") { emojiEl.innerText = "🥰"; emojiEl.title = `開心 (區間累計 ${happyCount} 次)`; }
                else if (latestVoiceCmd === "sotired") { emojiEl.innerText = "😫"; emojiEl.title = `好累 (區間累計 ${sotiredCount} 次)`; }
            } else {
                emojiEl.innerText = "😐";
                emojiEl.title = "所選區間無語音輸入";
            }

            const healthEl = document.getElementById("stat-health");
            const alertEl = document.getElementById("health-alert");
            if (fatigueScore >= 75 || hrs >= 8) {
                healthEl.innerText = `高度疲勞 (${fatigueScore}分)`;
                healthEl.className = "text-2xl font-extrabold text-red-500 mt-2";
                if(viewMode === 'day') alertEl.classList.remove("hidden");
            } else if (fatigueScore >= 45) {
                healthEl.innerText = `輕度疲勞 (${fatigueScore}分)`;
                healthEl.className = "text-2xl font-extrabold text-amber-500 mt-2";
                alertEl.classList.add("hidden");
            } else {
                healthEl.innerText = `身心良好 (${fatigueScore}分)`;
                healthEl.className = "text-2xl font-extrabold text-emerald-500 mt-2";
                alertEl.classList.add("hidden");
            }

            renderCharts(finalTimeline, hrs);
        }

        function aggregateDataBy2Hours(dataArr) {
            if (dataArr.length === 0) return [];
            let result = [];
            let intervalMs = 2 * 60 * 60 * 1000;
            let startTime = Math.floor(dataArr[0].timestamp.getTime() / intervalMs) * intervalMs;
            let endTime = dataArr[dataArr.length - 1].timestamp.getTime();

            for (let b = startTime; b <= endTime; b += intervalMs) {
                let bucket = dataArr.filter(item => item.timestamp.getTime() >= b && item.timestamp.getTime() < b + intervalMs);
                if (bucket.length > 0) {
                    let avgDist = bucket.reduce((a,b)=>a+b.distance, 0) / bucket.length;
                    let avgLight = bucket.reduce((a,b)=>a+b.light, 0) / bucket.length;
                    let avgWeight = bucket.reduce((a,b)=>a+b.weight, 0) / bucket.length;
                    
                    let counts = {"上班中":0, "休息中":0, "下班":0};
                    bucket.forEach(item => counts[item.status]++);
                    let majorStatus = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);

                    result.push({
                        timestamp: new Date(b),
                        distance: avgDist,
                        light: avgLight,
                        status: majorStatus,
                        weight: avgWeight
                    });
                }
            }
            return result;
        }

        function renderCharts(timeline, workHours) {
            const labels = timeline.map(item => {
                let hh = String(item.timestamp.getHours()).padStart(2, '0');
                let mm = String(item.timestamp.getMinutes()).padStart(2, '0');
                return `${hh}:${mm}`;
            });

            chartMixed.data.labels = labels;
            chartMixed.data.datasets[0].data = timeline.map(item => item.distance);
            chartMixed.data.datasets[1].data = timeline.map(item => item.light);
            chartMixed.data.datasets[2].data = timeline.map(item => item.status === "上班中" ? 100 : (item.status === "休息中" ? 40 : 10));
            chartMixed.data.datasets[2].backgroundColor = timeline.map(item => item.status === "上班中" ? 'rgba(16, 185, 129, 0.15)' : (item.status === "休息中" ? 'rgba(245, 158, 11, 0.1)' : 'rgba(148, 163, 184, 0.05)'));
            chartMixed.update();

            let restHours = Math.max(0, 24 - workHours);
            chartHealth.data.datasets[0].data = [workHours, restHours];
            chartHealth.data.datasets[0].backgroundColor = workHours >= 8 ? ['#ef4444', '#cbd5e1'] : ['#10b981', '#cbd5e1'];
            chartHealth.update();

            chartWeightCurve.data.labels = labels;
            chartWeightCurve.data.datasets[0].data = timeline.map(item => item.weight);
            chartWeightCurve.update();
        }

        function initCharts() {
            chartMixed = new Chart(document.getElementById('chart-mixed'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: '距離 (cm)', data: [], borderColor: '#6366f1', borderWidth: 2, yAxisID: 'y', tension: 0.1 },
                        { label: '光敏電阻值 (LDR)', data: [], borderColor: '#f59e0b', borderWidth: 2, yAxisID: 'y1', tension: 0.1 },
                        { label: '行為區域 (高:上班 | 中:休息 | 低:下班)', data: [], type: 'bar', backgroundColor: [], barPercentage: 1.0, categoryPercentage: 1.0, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { type: 'linear', position: 'left', title: { display: true, text: '公分 (cm)' } }, 
                        y1: { type: 'linear', position: 'right', max: 120, min: 0, grid: { drawOnChartArea: false } } 
                    }
                }
            });

            chartHealth = new Chart(document.getElementById('chart-health'), {
                type: 'doughnut',
                data: { labels: ['工作時數', '休息時數'], datasets: [{ data: [0, 24], backgroundColor: ['#10b981', '#cbd5e1'] }] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            chartWeightCurve = new Chart(document.getElementById('chart-weight-curve'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: '水杯實時淨重變化 (g)', data: [], borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.05)', fill: true, tension: 0.1, pointRadius: 1 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { title: { display: true, text: '重量 (g)' } } } }
            });
        }
    </script>
</body>
</html>
